<template>
    <div class="doom-wrapper">
        <template lwc:if={loading}>
            <div class="doom-loading">
                <p>⚡ Loading DOOM...</p>
                <p class="doom-status">{statusText}</p>
            </div>
        </template>
        <canvas
            id="canvas"
            class="doom-canvas"
            lwc:ref="gameCanvas"
            width="640"
            height="400"
            tabindex="-1"
            oncontextmenu={preventContext}>
        </canvas>
    </div>
</template>
